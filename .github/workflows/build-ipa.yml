name: Build WizardiOS IPA

# Builds an UNSIGNED .ipa on GitHub's macOS runners (full Xcode 16).
# The app compiles RetroArch (Libretro.framework) from the submodule, links the
# 35 prebuilt libretro core frameworks (Git LFS), and resolves ~55 SPM packages.
# Download the artifact and sign/sideload with AltStore or SideStore.

on:
  push:
    branches: [main]
    paths-ignore: ['README.md', 'docs/**']
  workflow_dispatch:

concurrency:
  group: build-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Checkout (with submodules + LFS)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          lfs: true
          fetch-depth: 1

      - name: Ensure LFS objects (super + submodules)
        run: |
          git lfs install
          git lfs pull
          git submodule foreach --recursive 'git lfs pull || true'

      - name: Select Xcode 26.4.1 (matches upstream Manic's dev toolchain; iOS 26 SDK)
        run: |
          echo "Available Xcodes:"; ls -d /Applications/Xcode*.app 2>/dev/null || true
          # Upstream Manic is developed on Xcode 26.4.1 (CreatedOnToolsVersion in pbxproj).
          # That toolchain builds the R.swift build-tool plugin + RswiftResources cleanly,
          # whereas 26.6 RC2 regressed plugin-generated module resolution. Pin to 26.4.1,
          # then fall back to the newest stable 26.x (avoid Release_Candidate builds), then any.
          PICK=/Applications/Xcode_26.4.1.app
          if [ ! -d "$PICK" ]; then
            PICK=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | grep -v -i "Release_Candidate\|beta" | sort -V | tail -1)
          fi
          [ -n "$PICK" ] && [ -d "$PICK" ] || PICK=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting $PICK"
          sudo xcode-select -s "$PICK/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Download Metal Toolchain (Xcode 26 ships it separately; ColorfulX needs .metal compile)
        run: |
          xcodebuild -downloadComponent MetalToolchain || \
            sudo xcodebuild -downloadComponent MetalToolchain
          # sanity: metal should now resolve
          xcrun -f metal || true

      - name: Show schemes
        working-directory: ManicEmu
        run: xcodebuild -list -project ManicEmu.xcodeproj || true

      - name: Build (unsigned, device)
        working-directory: ManicEmu
        run: |
          set -o pipefail
          xcodebuild \
            -project ManicEmu.xcodeproj \
            -scheme ManicEmuRelease \
            -configuration SideloadRelease \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build \
            -clonedSourcePackagesDirPath ../.spm \
            -skipPackagePluginValidation \
            -skipMacroValidation \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO \
            build 2>&1 | tee build.log
          rc=$?
          if [ $rc -ne 0 ]; then
            echo "=== build failed; last 120 log lines ==="
            tail -120 build.log
            echo "=== grep for 'error:' ==="
            grep -n "error:" build.log | tail -40 || true
          fi
          exit $rc

      - name: Package .ipa
        if: success()
        working-directory: ManicEmu
        run: |
          APP=$(find build/Build/Products -maxdepth 2 -name '*.app' | head -1)
          echo "App bundle: $APP"
          [ -n "$APP" ] || { echo "No .app produced"; exit 1; }
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry WizardiOS-unsigned.ipa Payload
          ls -lh WizardiOS-unsigned.ipa

      - name: Upload IPA
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WizardiOS-unsigned-ipa
          path: ManicEmu/WizardiOS-unsigned.ipa
          if-no-files-found: error

      - name: Upload build log (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ManicEmu/build.log
          if-no-files-found: ignore
